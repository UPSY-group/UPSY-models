name: UFEMISM compiling
run-name: ${{ github.actor }} - UFEMISM compiling
on:
  workflow_call:

jobs:
  compile_UFEMISM:
    name: ${{ matrix.os }}-${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        build_type: [dev, perf]
    steps:

    # Install all required packages and compile the code
    # ==================================================

      - name: Set up Homebrew (ubuntu)                 # Not installed by default on ubuntu runners
        if: matrix.os == 'ubuntu-latest'
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install packages with Homebrew (macos)  # Packages end up in /opt/homebrew/Cellar
        if: matrix.os == 'macos-latest'
        run: |
          #brew install gcc                    # Not needed on GitHub server, already installed
          brew install open-mpi
          brew install petsc
          brew unlink hdf5-mpi                 # To fix the following conflict: "hdf5-mpi: because hdf5-mpi is a variant of hdf5, one can only use one or the other"
          brew install netcdf
          brew install netcdf-fortran
          #brew install cmake                  # Not needed, already installed
          #brew install ninja

      - name: Add Homebrew to PATH (ubuntu)             # act does not persist PATH from setup-homebrew into csh subprocesses
        if: matrix.os == 'ubuntu-latest'
        run: echo "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH

      - name: Install packages with Homebrew (ubuntu)  # Packages end up in /opt/homebrew/Cellar
        if: matrix.os == 'ubuntu-latest'
        run: |
          brew update
          brew install open-mpi
          brew install netcdf
          brew install netcdf-fortran
          brew unlink hdf5
          brew install petsc
          brew install cmake
          brew install ninja

      - name: Set up Fortran compiler          # See: https://github.com/marketplace/actions/setup-fortran
        uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: gcc
          version: 15

      - name: Verify compiler setup
        run: gfortran --version

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update submodules
        run: |
          git submodule update --init --remote

      - name: Install csh (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install csh

      - name: Compile UFEMISM (macos)
        if: matrix.os == 'macos-latest'
        run: ./compile_UFEMISM.csh ${{ matrix.build_type }} clean

      - name: Compile UFEMISM (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: csh compile_UFEMISM.csh  ${{ matrix.build_type }}  clean

      - name: Verify compiling (macos)
        if: matrix.os == 'macos-latest'
        run: ./automated_testing/check_if_UFEMISM_programs_exist.csh

      - name: Verify compiling (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: csh automated_testing/check_if_UFEMISM_programs_exist.csh
