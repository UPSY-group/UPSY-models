name: Deploy UFEMISM Weekly Benchmarks Pages
run-name: ${{ github.actor }} - Deploy UFEMISM Weekly Benchmarks Pages
on:
  workflow_call:

permissions:
  pages: write
  id-token: write

jobs:
  deploy_pages:
    name: deploy-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4