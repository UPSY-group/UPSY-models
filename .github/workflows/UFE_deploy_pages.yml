name: Publish UFEMISM Weekly Benchmarks Pages
run-name: ${{ github.actor }} - Publish UFEMISM Weekly Benchmarks Pages
on:
  workflow_call:
    inputs:
      preview:
        description: Upload the generated site as an artifact instead of deploying to GitHub Pages
        required: false
        default: false
        type: boolean
      site_artifact_name:
        description: Name of the generated site artifact to publish
        required: false
        default: ufemism_weekly_benchmarks_site
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy_pages:
    name: deploy-pages
    runs-on: ubuntu-latest
    steps:
      - name: Download generated site artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.site_artifact_name }}
          path: site

      - name: Upload preview site artifact
        if: inputs.preview
        uses: actions/upload-artifact@v4.3.4
        with:
          name: ufemism_weekly_benchmarks_preview_site
          path: site
          if-no-files-found: error

      - name: Upload Pages artifact
        if: ${{ !inputs.preview }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: ${{ !inputs.preview }}
        uses: actions/deploy-pages@v4