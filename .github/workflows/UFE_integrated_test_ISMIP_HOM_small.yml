name: UFEMISM integrated test - ISMIP-HOM (small)
run-name: ${{ github.actor }} - UFEMISM integrated test - ISMIP-HOM (small)
on:
  workflow_call:

jobs:
  ISMIP_HOM_small:
    name: ISMIP-HOM (small)
    runs-on: macos-latest
    steps:

    # Install all required packages and compile the code
    # ==================================================

      - name: Install MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          cache: true

      - name: Install packages with Homebrew   # Packages end up in /opt/homebrew/Cellar
        run: |
          #brew install gcc                    # Not needed on GitHub server, already installed
          brew install open-mpi
          brew install petsc
          brew unlink hdf5-mpi                 # To fix the following conflict: "hdf5-mpi: because hdf5-mpi is a variant of hdf5, one can only use one or the other"
          brew install netcdf
          brew install netcdf-fortran
          #brew install cmake                  # Not needed, already installed
          #brew install ninja

      - name: Set up Fortran compiler          # See: https://github.com/marketplace/actions/setup-fortran
        uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: gcc
          version: 15

      - name: Verify compiler setup
        run: gfortran --version

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update submodules
        run: |
          git submodule update --init --remote

      - name: Compile UFEMISM
        run: csh compile_UFEMISM.csh  dev  clean

      - name: Run integrated test
        run: csh automated_testing/UFEMISM/integrated_test_ISMIP_HOM_small/test_script.csh

      - name: Check test result
        uses: matlab-actions/run-command@v3
        with:
          command: |
            addpath('automated_testing')
            reduce_all_netcdfs_in_folder_to_checksum('${{github.workspace}}/automated_testing/UFEMISM/integrated_test_ISMIP_HOM_small/results')
            compare_all_netcdfs_in_test_folder('${{github.workspace}}/automated_testing/UFEMISM/integrated_test_ISMIP_HOM_small')
