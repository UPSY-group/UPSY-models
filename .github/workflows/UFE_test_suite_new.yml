# The full UFEMISM Test Suite

name: UFEMISM Test Suite (new)
run-name: ${{ github.actor }} - UFEMISM Test Suite (new)
on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/UFEMISM/**'
  workflow_dispatch:

jobs:

  # Run the individual tests in parallel as separate workflows
  compile_UFEMISM:
    uses: ./.github/workflows/UFE_compiling.yml

  unit_tests:
    uses: ./.github/workflows/UFE_unit_tests.yml

  SSA_icestream_small:
    uses: ./.github/workflows/UFE_integrated_test_SSA_icestream_small.yml

  ISMIP_HOM_small:
    uses: ./.github/workflows/UFE_integrated_test_ISMIP_HOM_small.yml

  Halfar_dome_small:
    uses: ./.github/workflows/UFE_integrated_test_Halfar_dome_small.yml

  MISMIP_mod_small:
    uses: ./.github/workflows/UFE_integrated_test_MISMIP_mod_small.yml

  MISMIPplus_small:
    uses: ./.github/workflows/UFE_integrated_test_MISMIPplus_small.yml

  Berends2023nudging_exp1_small:
    uses: ./.github/workflows/UFE_integrated_test_Berends2023nudging_exp1_small.yml

  Berends2023nudging_exp2_small:
    uses: ./.github/workflows/UFE_integrated_test_Berends2023nudging_exp2_small.yml

  Ant_init_small_01:
    uses: ./.github/workflows/UFE_integrated_test_Ant_init_small_01.yml
