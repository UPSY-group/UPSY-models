# The UFEMISM Weekly Benchmarks

name: UFEMISM Weekly Benchmarks
run-name: ${{ github.actor }} - UFEMISM Weekly Benchmarks
on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

jobs:

  MISMIPplus_full:
    uses: ./.github/workflows/UFE_weekly_benchmarks_run_test.yml
    with:
      test_path: automated_testing/UFEMISM/integrated_test_MISMIPplus_full

  MISMIP_mod_full:
    uses: ./.github/workflows/UFE_weekly_benchmarks_run_test.yml
    with:
      test_path: automated_testing/UFEMISM/integrated_test_MISMIP_mod_full