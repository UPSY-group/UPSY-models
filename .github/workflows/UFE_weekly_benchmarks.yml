name: UFEMISM Weekly Benchmarks
run-name: ${{ github.actor }} - UFEMISM Weekly Benchmarks
on:
  workflow_dispatch:
    inputs:
      preview:
        description: Upload the generated site as a downloadable artifact instead of deploying to Pages
        required: false
        default: false
        type: boolean
      short_test:
        description: Run short versions of tests
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ufemism-weekly-benchmarks-pages
  cancel-in-progress: true

jobs:

  # Run and analyse all the full integrated tests

  Halfar_dome:
    uses: ./.github/workflows/UFE_weekly_benchmarks_run_test.yml
    with:
      test_path: automated_testing/UFEMISM/integrated_test_Halfar_dome_full
      short_test: ${{ github.event_name == 'workflow_dispatch' && inputs.short_test }}

  MISMIPplus_full:
    uses: ./.github/workflows/UFE_weekly_benchmarks_run_test.yml
    with:
      test_path: automated_testing/UFEMISM/integrated_test_MISMIPplus_full
      short_test: ${{ github.event_name == 'workflow_dispatch' && inputs.short_test }}

  MISMIP_mod_full:
    uses: ./.github/workflows/UFE_weekly_benchmarks_run_test.yml
    with:
      test_path: automated_testing/UFEMISM/integrated_test_MISMIP_mod_full
      short_test: ${{ github.event_name == 'workflow_dispatch' && inputs.short_test }}

  SSA_icestream_full:
    uses: ./.github/workflows/UFE_weekly_benchmarks_run_test.yml
    with:
      test_path: automated_testing/UFEMISM/integrated_test_SSA_icestream_full
      short_test: ${{ github.event_name == 'workflow_dispatch' && inputs.short_test }}

  ISMIP_HOM_full:
    uses: ./.github/workflows/UFE_weekly_benchmarks_run_test.yml
    with:
      test_path: automated_testing/UFEMISM/integrated_test_ISMIP_HOM_full
      short_test: ${{ github.event_name == 'workflow_dispatch' && inputs.short_test }}

  Ant_init_full_01:
    uses: ./.github/workflows/UFE_weekly_benchmarks_run_test.yml
    with:
      test_path: automated_testing/UFEMISM/integrated_test_Ant_init_full_01
      short_test: ${{ github.event_name == 'workflow_dispatch' && inputs.short_test }}

  # Combine the resulting figures into a neat little website

  build_site:
    needs:
      - Halfar_dome
      - MISMIPplus_full
      - MISMIP_mod_full
      - SSA_icestream_full
      - ISMIP_HOM_full
      - Ant_init_full_01
    if: always()
    uses: ./.github/workflows/UFE_weekly_benchmarks_build_site.yml
    with:
      test_names: >-
        integrated_test_Halfar_dome_full
        integrated_test_MISMIPplus_full
        integrated_test_MISMIP_mod_full
        integrated_test_SSA_icestream_full
        integrated_test_ISMIP_HOM_full
        integrated_test_Ant_init_full_01

  deploy_pages:
    needs: build_site
    if: always() && needs.build_site.result == 'success'
    uses: ./.github/workflows/UFE_weekly_benchmarks_deploy_pages.yml
    with:
      preview: ${{ github.event_name == 'workflow_dispatch' && inputs.preview }}
      site_artifact_name: ufemism_weekly_benchmarks_site