# The UFEMISM Weekly Benchmarks

name: UFEMISM Weekly Benchmarks
run-name: ${{ github.actor }} - UFEMISM Weekly Benchmarks
on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ufemism-weekly-benchmarks-pages
  cancel-in-progress: true

jobs:

  MISMIPplus_full:
    uses: ./.github/workflows/UFE_weekly_benchmarks_run_test.yml
    with:
      test_path: automated_testing/UFEMISM/integrated_test_MISMIPplus_full

  MISMIP_mod_full:
    uses: ./.github/workflows/UFE_weekly_benchmarks_run_test.yml
    with:
      test_path: automated_testing/UFEMISM/integrated_test_MISMIP_mod_full

  prepare_pages:
    needs:
      - MISMIPplus_full
      - MISMIP_mod_full
    if: always()
    uses: ./.github/workflows/UFE_weekly_benchmarks_prepare_pages.yml

  deploy_pages:
    needs: prepare_pages
    if: always() && needs.prepare_pages.result == 'success'
    uses: ./.github/workflows/UFE_deploy_pages.yml