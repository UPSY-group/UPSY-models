name: UFEMISM Weekly Benchmarks - run test
run-name: ${{ github.actor }} - run test
on:
  workflow_call:
    inputs:
      test_path:
        description: Path to test directory
        required: true
        type: string

jobs:
  run_test:
    name: run
    runs-on: macos-latest
    steps:

    # Install all required packages and compile the code
    # ==================================================

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update submodules
        run: |
          git submodule update --init --recursive

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: upsy
          cache-environment: true
          cache-downloads: true

      - name: Verify compiler setup
        shell: micromamba-shell {0}
        run: gfortran --version

      - name: Compile model code
        shell: micromamba-shell {0}
        run: csh compile_UFEMISM.csh  dev  clean

    # Run the test and check its results against the reference
    # ========================================================

      - name: Run test
        shell: micromamba-shell {0}
        run: csh ${{ inputs.test_path }}/test_script.csh

      - name: Make figures
        shell: micromamba-shell {0}
        env:
          MPLBACKEND: Agg
        run: python ${{ inputs.test_path }}/make_figures.py --results-root ${{ inputs.test_path }} --output-dir ${{ inputs.test_path }}

      - name: Derive artifact name
        id: artifact_name
        shell: bash
        run: printf 'value=%s\n' "$(basename "${{ inputs.test_path }}")" >> "$GITHUB_OUTPUT"

      - name: Upload benchmark figures as artifact
        if: always()
        uses: actions/upload-artifact@v4.3.4
        with:
          name: benchmark_figures_${{ steps.artifact_name.outputs.value }}
          path: ${{ inputs.test_path }}/*.png
          if-no-files-found: warn
